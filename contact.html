<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Gliders Homeschooling</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="bd">

    <!-- ===== Header / Navbar ===== -->

    <header>
        <nav class="navbar">
    
            <img src="TG logo.jpeg" class="logo" alt="Tiny Gliders Logo">
    
            <!-- Hamburger -->
            <div class="menu-toggle" id="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
    
            <!-- Nav Links -->
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="testimonial.html">Testimonials</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
    
        </nav>
    </header>

    <!-- ===== Contact & Enquiry Section ===== -->

    <section class="contact-section">

        <div class="container">

            <h2 class="section-title">Admissions & Enquiry</h2>

            <p class="section-subtitle">
                Have questions or want to learn more? Send us an enquiry and we’ll be happy to help.
            </p>


            <div class="contact-grid">

                <!-- Contact Info -->

                <div class="contact-info">

                    <h3>Get in Touch</h3>

                    <p><i class="fas fa-phone"></i> +91 9962471715</p>

                    <p><i class="fas fa-envelope"></i> tinyglidersschool@gmail.com</p>

                    <p><i class="fas fa-map-marker-alt"></i> Erode, Tamil Nadu</p>

                    <a href="https://wa.me/919962471715" target="_blank" class="whatsapp-contact">
                        <i class="fab fa-whatsapp"></i> Chat on WhatsApp
                    </a>

                </div>


                <!-- Enquiry Form -->
                <p id="form-status" class="form-status"></p>

                <div class="contact-form">

                    <form id="contact-form" action="https://formspree.io/f/xgonnzwb" method="POST">

                        <input type="text" name="parent_name" placeholder="Parent Name" required>

                        <input type="text" name="child_name" placeholder="Child Name">

                        <input type="tel" name="phone" placeholder="Phone Number" required>

                        <input type="hidden" name="_subject" value="New Tiny Gliders Enquiry">

                        <select name="grade" required>

                            <option value="">Select Grade</option>

                            <option>Pre-KG / KG</option>
                            <option>Grade 1</option>
                            <option>Grade 2</option>
                            <option>Grade 3</option>
                            <option>Grade 4</option>
                            <option>Grade 5</option>
                            <option>Grade 6</option>
                            <option>Grade 7</option>
                            <option>Grade 8</option>
                            <option>Grade 9</option>
                            <option>Grade 10</option>
                            <option>Grade 12</option>

                        </select>

                        <textarea name="message" placeholder="Your Message">
</textarea>

                        <button type="submit">Submit Enquiry</button>

                    </form>

                </div>

            </div>

        </div>

    </section>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("show");
                        }
                    });
                }, {
                    threshold: 0.2
                });

                const elements = document.querySelectorAll(
                    "section, .contact-info, .contact-form"
                );

                elements.forEach(el => observer.observe(el));

            });
        const form = document.getElementById('contact-form');
        const status = document.getElementById('form-status');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const data = new FormData(form);

            const response = await fetch(form.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            });

            if (response.ok) {
                status.className = "form-status success";
                status.innerText = "✨ Your message has been sent successfully!";
                form.reset();
            } else {
                status.className = "form-status error";
                status.innerText = "⚠️ Oops! Something went wrong. Please try again.";
            }
        });
        
                const toggle = document.getElementById("menu-toggle");
                const navLinks = document.getElementById("nav-links");

                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");

                if (navLinks.classList.contains("active")) {
                    toggle.innerHTML = '<i class="fas fa-times"></i>';
    } else {
                    toggle.innerHTML = '<i class="fas fa-bars"></i>';
    }
});
        

    </script>
    


</body>

</html>
